<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Viewer - Elegant JSON Visualizer</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <!-- Prism.js para syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <style>
        .json-editor {
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .tree-node {
            transition: all 0.2s ease;
        }
        
        .tree-node:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* Tooltips customizados */
        .tooltip-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .tooltip-content {
            position: fixed;
            padding: 6px 10px;
            background-color: #111827;
            color: white;
            font-size: 12px;
            white-space: nowrap;
            border-radius: 6px;
            z-index: 99999;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transform: translate(-50%, calc(-100% - 8px));
            opacity: 0;
            animation: tooltipFadeIn 0.15s ease-out forwards;
        }
        
        @keyframes tooltipFadeIn {
            from { 
                opacity: 0;
            }
            to { 
                opacity: 1;
            }
        }
        
        /* Toast notification */
        .toast-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background-color: #111827;
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            z-index: 999999;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastSlideIn 0.3s ease-out;
        }
        
        @keyframes toastSlideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast-notification.toast-exit {
            animation: toastSlideOut 0.3s ease-in forwards;
        }
        
        @keyframes toastSlideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        
        .tooltip-content::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #111827;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // Componente principal App
        function App() {
            const [jsonData, setJsonData] = useState('');
            const [parsedJson, setParsedJson] = useState(null);
            const [isValid, setIsValid] = useState(true);
            const [error, setError] = useState('');
            const [viewMode, setViewMode] = useState('editor'); // 'editor' or 'tree'
            const [darkMode, setDarkMode] = useState(false);
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);
            const [stats, setStats] = useState({ lines: 0, characters: 0 });
            const [toast, setToast] = useState(null);

            // Function to show toast
            const showToast = useCallback((message) => {
                setToast(message);
                setTimeout(() => {
                    setToast(null);
                }, 2000);
            }, []);

            // Load history from localStorage
            useEffect(() => {
                const savedHistory = localStorage.getItem('jsonViewerHistory');
                if (savedHistory) {
                    setHistory(JSON.parse(savedHistory));
                }
                
                const savedDarkMode = localStorage.getItem('jsonViewerDarkMode');
                if (savedDarkMode) {
                    setDarkMode(JSON.parse(savedDarkMode));
                }
            }, []);

            // Save dark mode to localStorage
            useEffect(() => {
                localStorage.setItem('jsonViewerDarkMode', JSON.stringify(darkMode));
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            // Validate JSON in real-time
            useEffect(() => {
                if (!jsonData.trim()) {
                    setIsValid(true);
                    setError('');
                    setParsedJson(null);
                    setStats({ lines: 0, characters: 0 });
                    return;
                }

                try {
                    const parsed = JSON.parse(jsonData);
                    setParsedJson(parsed);
                    setIsValid(true);
                    setError('');
                } catch (e) {
                    setIsValid(false);
                    setError(e.message);
                    setParsedJson(null);
                }

                setStats({
                    lines: jsonData.split('\n').length,
                    characters: jsonData.length
                });
            }, [jsonData]);

            // Add to history
            const addToHistory = useCallback((data) => {
                if (!data.trim()) return;
                
                const newHistory = [data, ...history.filter(item => item !== data)].slice(0, 10);
                setHistory(newHistory);
                localStorage.setItem('jsonViewerHistory', JSON.stringify(newHistory));
            }, [history]);

            // Beautify JSON
            const beautifyJson = useCallback(() => {
                if (!isValid || !parsedJson) return;
                
                const beautified = JSON.stringify(parsedJson, null, 2);
                setJsonData(beautified);
                addToHistory(beautified);
            }, [isValid, parsedJson, addToHistory]);

            // Minify JSON
            const minifyJson = useCallback(() => {
                if (!isValid || !parsedJson) return;
                
                const minified = JSON.stringify(parsedJson);
                setJsonData(minified);
                addToHistory(minified);
            }, [isValid, parsedJson, addToHistory]);

            // Copy to clipboard
            const copyToClipboard = useCallback(async () => {
                try {
                    await navigator.clipboard.writeText(jsonData);
                    showToast('JSON copied!');
                } catch (err) {
                    console.error('Copy error:', err);
                    showToast('Copy error');
                }
            }, [jsonData, showToast]);

            // Download JSON
            const downloadJson = useCallback(() => {
                const blob = new Blob([jsonData], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'data.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, [jsonData]);

            // Clear editor
            const clearEditor = useCallback(() => {
                setJsonData('');
                setParsedJson(null);
                setIsValid(true);
                setError('');
            }, []);

            // Load from history
            const loadFromHistory = useCallback((data) => {
                setJsonData(data);
                addToHistory(data);
                setShowHistory(false);
            }, [addToHistory]);

            return (
                <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'dark' : ''}`}>
                    {/* Header */}
                    <header className="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center space-x-4">
                                    <h1 className="text-xl font-bold text-gray-900 dark:text-white">
                                        JSON Viewer
                                    </h1>
                                    <div className="flex items-center space-x-2">
                                        <button
                                            onClick={() => setViewMode('editor')}
                                            className={`px-3 py-1 rounded-md text-sm font-medium transition-colors ${
                                                viewMode === 'editor'
                                                    ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300'
                                                    : 'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200'
                                            }`}
                                        >
                                            Editor
                                        </button>
                                        <button
                                            onClick={() => setViewMode('tree')}
                                            className={`px-3 py-1 rounded-md text-sm font-medium transition-colors ${
                                                viewMode === 'tree'
                                                    ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300'
                                                    : 'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200'
                                            }`}
                                        >
                                            Tree View
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex items-center space-x-2">
                                    <button
                                        onClick={() => setShowHistory(!showHistory)}
                                        className="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors"
                                        title="History"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                    </button>
                                    
                                    <button
                                        onClick={() => setDarkMode(!darkMode)}
                                        className="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors"
                                        title="Dark mode"
                                    >
                                        {darkMode ? (
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                                            </svg>
                                        ) : (
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Toolbar */}
                    <Toolbar
                        isValid={isValid}
                        viewMode={viewMode}
                        onBeautify={beautifyJson}
                        onMinify={minifyJson}
                        onCopy={copyToClipboard}
                        onDownload={downloadJson}
                        onClear={clearEditor}
                        stats={stats}
                    />

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 h-full">
                        <div className="flex flex-col gap-6 h-full" style={{ minHeight: 'calc(100vh - 220px)' }}>
                            {/* Top Statistics Bar */}
                            <div className="bg-white dark:bg-gray-800 rounded-lg shadow px-6 py-3">
                                <div className="flex items-center justify-between flex-wrap gap-4">
                                    <div className="flex items-center gap-6">
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-gray-600 dark:text-gray-400">Lines:</span>
                                            <span className="text-sm font-medium text-gray-900 dark:text-white">{stats.lines}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-gray-600 dark:text-gray-400">Characters:</span>
                                            <span className="text-sm font-medium text-gray-900 dark:text-white">{stats.characters}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-gray-600 dark:text-gray-400">Status:</span>
                                            <span className={`text-sm font-medium ${isValid ? 'text-green-600' : 'text-red-600'}`}>
                                                {isValid ? 'Valid' : 'Invalid'}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    {/* History Panel (inline when opened) */}
                                    {showHistory && (
                                        <div className="flex-1 min-w-[300px]">
                                            <HistoryPanel
                                                history={history}
                                                onLoad={loadFromHistory}
                                                onClear={() => {
                                                    setHistory([]);
                                                    localStorage.removeItem('jsonViewerHistory');
                                                }}
                                                darkMode={darkMode}
                                                inline={true}
                                            />
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Editor/Tree View */}
                            <div className="flex-1 overflow-hidden">
                                {viewMode === 'editor' ? (
                                    <JsonEditor
                                        jsonData={jsonData}
                                        setJsonData={setJsonData}
                                        isValid={isValid}
                                        error={error}
                                        darkMode={darkMode}
                                    />
                                ) : (
                                    <TreeView
                                        data={parsedJson}
                                        isValid={isValid}
                                        darkMode={darkMode}
                                        showToast={showToast}
                                    />
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Toast Notification */}
                    {toast && <Toast message={toast} />}

                    {/* Footer */}
                    <footer className="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-4">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-2">
                                <p className="text-sm text-gray-600 dark:text-gray-400">
                                    Developed with ❤️ to make JSON visualization easier
                                </p>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-gray-600 dark:text-gray-400">⭐ If you liked it, consider giving a star on GitHub!</span>
                                    <a 
                                        href="https://github.com/souzara/jviewer" 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="inline-flex items-center gap-2 px-4 py-2 bg-gray-900 dark:bg-gray-700 text-white rounded-md hover:bg-gray-800 dark:hover:bg-gray-600 transition-colors"
                                    >
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                            <path fillRule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clipRule="evenodd" />
                                        </svg>
                                        View on GitHub
                                    </a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Componente Toast
        function Toast({ message }) {
            return (
                <div className="toast-notification">
                    <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                    </svg>
                    <span>{message}</span>
                </div>
            );
        }

        // Componente Toolbar
        function Toolbar({ isValid, viewMode, onBeautify, onMinify, onCopy, onDownload, onClear, stats }) {
            const isTreeView = viewMode === 'tree';
            
            return (
                <div className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-12">
                            <div className="flex items-center space-x-2">
                                <button
                                    onClick={onBeautify}
                                    disabled={!isValid || isTreeView}
                                    className="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
                                >
                                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                    Beautify
                                </button>
                                
                                <button
                                    onClick={onMinify}
                                    disabled={!isValid || isTreeView}
                                    className="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md text-white bg-green-600 hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
                                >
                                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    Minify
                                </button>
                                
                                <button
                                    onClick={onCopy}
                                    disabled={isTreeView}
                                    className="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-gray-600 text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:text-gray-500 transition-colors"
                                >
                                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                    </svg>
                                    Copy
                                </button>
                                
                                <button
                                    onClick={onDownload}
                                    disabled={isTreeView}
                                    className="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-gray-600 text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:text-gray-500 transition-colors"
                                >
                                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    Download
                                </button>
                                
                                <button
                                    onClick={onClear}
                                    disabled={isTreeView}
                                    className="inline-flex items-center px-3 py-1.5 border border-red-300 dark:border-red-600 text-xs font-medium rounded-md text-red-700 dark:text-red-300 bg-white dark:bg-gray-700 hover:bg-red-50 dark:hover:bg-red-900/20 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:text-gray-500 disabled:border-gray-300 transition-colors"
                                >
                                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                    Clear
                                </button>
                            </div>
                            
                            <div className="text-sm text-gray-500 dark:text-gray-400">
                                {stats.lines} lines • {stats.characters} characters
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Componente JsonEditor
        function JsonEditor({ jsonData, setJsonData, isValid, error, darkMode }) {
            const [scrollTop, setScrollTop] = useState(0);
            const textareaRef = React.useRef(null);
            const prevJsonLengthRef = React.useRef(0);
            
            const lineCount = jsonData ? jsonData.split('\n').length : 1;
            const lineNumbers = Array.from({ length: lineCount }, (_, i) => i + 1);
            
            const handleScroll = (e) => {
                setScrollTop(e.target.scrollTop);
            };

            // Scroll to top when user pastes or significantly changes content
            useEffect(() => {
                if (textareaRef.current && jsonData.length > 0) {
                    const lengthDiff = Math.abs(jsonData.length - prevJsonLengthRef.current);
                    // If content changed significantly (paste or beautify/minify), scroll to top
                    if (lengthDiff > 50) {
                        textareaRef.current.scrollTop = 0;
                        setScrollTop(0);
                    }
                    prevJsonLengthRef.current = jsonData.length;
                }
            }, [jsonData]);
            
            return (
                <div className="bg-white dark:bg-gray-800 rounded-lg shadow h-full flex flex-col border-r border-gray-200 dark:border-gray-700">
                    <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                        <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                            Editor JSON
                        </h3>
                    </div>
                    
                    <div className="flex-1 flex flex-col">
                        <div className="flex flex-1 overflow-hidden">
                            {/* Line Numbers */}
                            <div 
                                className={`select-none overflow-hidden ${
                                    darkMode 
                                        ? 'bg-gray-800 text-gray-500' 
                                        : 'bg-gray-50 text-gray-400'
                                }`}
                                style={{ 
                                    width: '50px',
                                    paddingTop: '16px',
                                    paddingBottom: '16px',
                                    borderRight: darkMode ? '1px solid #4B5563' : '1px solid #e5e7eb'
                                }}
                            >
                                <div 
                                    style={{ 
                                        transform: `translateY(-${scrollTop}px)`,
                                        fontFamily: 'Fira Code, Monaco, Consolas, monospace',
                                        fontSize: '14px',
                                        lineHeight: '1.5',
                                        textAlign: 'right',
                                        paddingRight: '12px'
                                    }}
                                >
                                    {lineNumbers.map((num) => (
                                        <div key={num}>{num}</div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Editor */}
                            <textarea
                                ref={textareaRef}
                                value={jsonData}
                                onChange={(e) => setJsonData(e.target.value)}
                                onScroll={handleScroll}
                                placeholder="Paste your JSON here or type..."
                                className={`flex-1 p-4 border-0 resize-none focus:ring-0 focus:outline-none json-editor ${
                                    darkMode 
                                        ? 'bg-gray-900 text-gray-100 placeholder-gray-500' 
                                        : 'bg-white text-gray-900 placeholder-gray-500'
                                } ${!isValid ? 'border-b-2 border-red-500' : ''}`}
                                style={{ fontFamily: 'Fira Code, Monaco, Consolas, monospace' }}
                            />
                        </div>
                        
                        {!isValid && error && (
                            <div className="px-4 py-3 bg-red-50 dark:bg-red-900/20 border-t-2 border-red-200 dark:border-red-800 fade-in">
                                <div className="flex items-start">
                                    <svg className="w-5 h-5 text-red-400 mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-red-800 dark:text-red-200">
                                            JSON syntax error
                                        </p>
                                        <p className="text-sm text-red-700 dark:text-red-300 mt-1 break-words">
                                            {error}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* Bottom border - matching the top */}
                        <div className="px-4 border-t border-gray-200 dark:border-gray-700 flex-shrink-0" style={{ height: '23px' }}>
                            <div className="h-0"></div>
                        </div>
                    </div>
                </div>
            );
        }

        // Componente TreeView
        function TreeView({ data, isValid, darkMode, showToast }) {
            const [expandAll, setExpandAll] = useState(false);
            const [collapseAll, setCollapseAll] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            
            if (!isValid || !data) {
                return (
                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow">
                        <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                Tree View
                            </h3>
                        </div>
                        <div className="p-8 text-center">
                            <svg className="w-12 h-12 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p className="text-gray-500 dark:text-gray-400">
                                Enter a valid JSON to view in tree format
                            </p>
                        </div>
                    </div>
                );
            }

            const handleExpandAll = () => {
                setExpandAll(true);
                setCollapseAll(false);
                setTimeout(() => setExpandAll(false), 100);
            };

            const handleCollapseAll = () => {
                setCollapseAll(true);
                setExpandAll(false);
                setTimeout(() => setCollapseAll(false), 100);
            };

            return (
                <div className="bg-white dark:bg-gray-800 rounded-lg shadow h-full flex flex-col">
                    <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                        <div className="flex items-center justify-between">
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                Tree View
                            </h3>
                            <div className="flex items-center space-x-2">
                                {selectedItem && (
                                    <button
                                        onClick={() => setSelectedItem(null)}
                                        className="px-2 py-1 text-xs font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
                                        title="Close preview"
                                    >
                                        Close Preview
                                    </button>
                                )}
                                <button
                                    onClick={handleExpandAll}
                                    className="px-2 py-1 text-xs font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
                                    title="Expand all"
                                >
                                    Expand All
                                </button>
                                <button
                                    onClick={handleCollapseAll}
                                    className="px-2 py-1 text-xs font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
                                    title="Collapse all"
                                >
                                    Collapse All
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 flex overflow-hidden">
                        <div className={`overflow-auto p-4 transition-all duration-300 ${selectedItem ? 'w-1/2' : 'w-full'}`} style={{ minHeight: '500px' }}>
                            <TreeNode 
                                data={data} 
                                name="root" 
                                darkMode={darkMode} 
                                isRoot={true}
                                expandAll={expandAll}
                                collapseAll={collapseAll}
                                showToast={showToast}
                                onSelectItem={setSelectedItem}
                            />
                        </div>
                        
                        {/* Preview Panel */}
                        {selectedItem && (
                            <div className="w-1/2 border-l border-gray-200 dark:border-gray-700 flex flex-col">
                                <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between bg-gray-50 dark:bg-gray-900">
                                    <h4 className="text-sm font-semibold text-gray-900 dark:text-white">
                                        Preview: {selectedItem.key}
                                    </h4>
                                    <button
                                        onClick={() => setSelectedItem(null)}
                                        className="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto p-4">
                                    <pre className="text-sm font-mono text-gray-800 dark:text-gray-200 whitespace-pre-wrap break-words">
                                        {JSON.stringify(selectedItem.value, null, 2)}
                                    </pre>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Componente TreeNode (recursivo)
        function TreeNode({ data, name, darkMode, isRoot = false, expandAll = false, collapseAll = false, showToast, onSelectItem }) {
            const getValueType = (value) => {
                if (value === null) return 'null';
                if (Array.isArray(value)) return 'array';
                if (typeof value === 'object') return 'object';
                return typeof value;
            };

            const getValueColor = (type) => {
                const colors = {
                    string: 'text-green-600 dark:text-green-400',
                    number: 'text-blue-600 dark:text-blue-400',
                    boolean: 'text-yellow-600 dark:text-yellow-400',
                    null: 'text-gray-500 dark:text-gray-500',
                };
                return colors[type] || 'text-gray-700 dark:text-gray-300';
            };

            const formatValue = (value, type) => {
                if (type === 'string') return `"${value}"`;
                if (type === 'null') return 'null';
                if (type === 'boolean') return value.toString();
                if (type === 'number') return value.toString();
                return '';
            };

            const type = getValueType(data);

            // Renderizar valores primitivos inline na mesma linha
            if (type !== 'object' && type !== 'array') {
                return (
                    <span className={`${getValueColor(type)} font-mono text-sm`}>
                        {formatValue(data, type)}
                    </span>
                );
            }

            // Renderizar objetos e arrays
            const isArray = Array.isArray(data);
            const entries = isArray 
                ? data.map((item, index) => [index, item])
                : Object.entries(data);
            
            const isEmpty = entries.length === 0;

            // Para root, renderizar direto as propriedades
            if (isRoot) {
                return (
                    <div className="space-y-0">
                        {entries.map(([key, value], index) => (
                            <TreeNodeItem 
                                key={index}
                                itemKey={key}
                                value={value}
                                isArrayParent={isArray}
                                darkMode={darkMode}
                                level={0}
                                expandAll={expandAll}
                                collapseAll={collapseAll}
                                showToast={showToast}
                                onSelectItem={onSelectItem}
                            />
                        ))}
                    </div>
                );
            }

            return null;
        }

        // Componente TooltipButton
        function TooltipButton({ onClick, tooltip, children }) {
            const [showTooltip, setShowTooltip] = useState(false);
            const [position, setPosition] = useState(null);
            const buttonRef = React.useRef(null);
            const timeoutRef = React.useRef(null);

            const handleMouseEnter = () => {
                if (buttonRef.current) {
                    const rect = buttonRef.current.getBoundingClientRect();
                    setPosition({
                        top: rect.top,
                        left: rect.left + rect.width / 2
                    });
                    
                    // Pequeno delay para garantir que a posição seja setada antes de mostrar
                    timeoutRef.current = setTimeout(() => {
                        setShowTooltip(true);
                    }, 10);
                }
            };

            const handleMouseLeave = () => {
                if (timeoutRef.current) {
                    clearTimeout(timeoutRef.current);
                }
                setShowTooltip(false);
                setPosition(null);
            };

            return (
                <div 
                    className="tooltip-wrapper"
                    onMouseEnter={handleMouseEnter}
                    onMouseLeave={handleMouseLeave}
                >
                    <button
                        ref={buttonRef}
                        onClick={onClick}
                        className="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded text-gray-500 dark:text-gray-400"
                    >
                        {children}
                    </button>
                    {showTooltip && position && (
                        <div 
                            className="tooltip-content"
                            style={{
                                top: `${position.top}px`,
                                left: `${position.left}px`
                            }}
                        >
                            {tooltip}
                        </div>
                    )}
                </div>
            );
        }

        // Componente TreeNodeItem - cada linha da árvore
        function TreeNodeItem({ itemKey, value, isArrayParent, darkMode, level = 0, expandAll = false, collapseAll = false, showToast, onSelectItem }) {
            const [isExpanded, setIsExpanded] = useState(false);
            
            // Responder aos comandos de expand/collapse all
            useEffect(() => {
                if (expandAll) {
                    setIsExpanded(true);
                } else if (collapseAll) {
                    setIsExpanded(false);
                }
            }, [expandAll, collapseAll]);
            
            const getValueType = (val) => {
                if (val === null) return 'null';
                if (Array.isArray(val)) return 'array';
                if (typeof val === 'object') return 'object';
                return typeof val;
            };

            const getValueColor = (type) => {
                const colors = {
                    string: 'text-green-600 dark:text-green-400',
                    number: 'text-blue-600 dark:text-blue-400',
                    boolean: 'text-yellow-600 dark:text-yellow-400',
                    null: 'text-gray-500 dark:text-gray-500',
                };
                return colors[type] || 'text-gray-700 dark:text-gray-300';
            };

            const formatValue = (val, type) => {
                if (type === 'string') return `"${val}"`;
                if (type === 'null') return 'null';
                if (type === 'boolean') return val.toString();
                if (type === 'number') return val.toString();
                return '';
            };

            const valueType = getValueType(value);
            const isComplex = valueType === 'object' || valueType === 'array';
            const isArrayType = valueType === 'array';

            // Para objetos e arrays, pegar as entradas
            let childEntries = [];
            if (isComplex) {
                childEntries = isArrayType 
                    ? value.map((item, index) => [index, item])
                    : Object.entries(value);
            }

            const copyToClipboard = async (text, type) => {
                try {
                    await navigator.clipboard.writeText(text);
                    const messages = {
                        key: 'Key copied!',
                        value: 'Value copied!',
                        both: 'Copied!'
                    };
                    showToast(messages[type] || 'Copied!');
                } catch (err) {
                    console.error('Copy error:', err);
                    showToast('Copy error');
                }
            };

            const getCopyValue = () => {
                if (isComplex) {
                    return JSON.stringify(value, null, 2);
                }
                return formatValue(value, valueType);
            };

            const [isHovered, setIsHovered] = useState(false);

            const handleItemClick = (e) => {
                // Evitar propagar o clique se for nos botões de copiar
                if (e.target.closest('button')) return;
                
                onSelectItem({
                    key: isArrayParent ? `[${itemKey}]` : itemKey,
                    value: value
                });
            };

            return (
                <div className="font-mono text-sm">
                    <div 
                        className="flex items-start py-0.5 hover:bg-gray-100 dark:hover:bg-gray-700 relative cursor-pointer" 
                        style={{ paddingLeft: `${level * 20}px` }}
                        onMouseEnter={() => setIsHovered(true)}
                        onMouseLeave={() => setIsHovered(false)}
                        onClick={handleItemClick}
                    >
                        {/* Ícone expand/collapse ou bullet */}
                        {isComplex && childEntries.length > 0 ? (
                            <span 
                                className="mr-1 cursor-pointer text-gray-500 dark:text-gray-400 select-none flex-shrink-0"
                                onClick={() => setIsExpanded(!isExpanded)}
                                style={{ width: '16px', display: 'inline-block' }}
                            >
                                {isExpanded ? '▼' : '▶'}
                            </span>
                        ) : (
                            <span className="mr-1 flex-shrink-0" style={{ width: '16px', display: 'inline-block' }}></span>
                        )}
                        
                        {/* Ícone de tipo */}
                        <span className="mr-2 flex-shrink-0" style={{ width: '16px' }}>
                            {valueType === 'object' && <span className="text-blue-500">●</span>}
                            {valueType === 'array' && <span className="text-purple-500">■</span>}
                            {valueType === 'string' && <span className="text-green-500">■</span>}
                            {valueType === 'number' && <span className="text-blue-500">■</span>}
                            {valueType === 'boolean' && <span className="text-yellow-500">■</span>}
                            {valueType === 'null' && <span className="text-gray-400">■</span>}
                        </span>
                        
                        {/* Nome da propriedade */}
                        <span className="text-gray-300 dark:text-gray-300 mr-2 flex-shrink-0">
                            {isArrayParent ? `[${itemKey}]` : itemKey}:
                        </span>
                        
                        {/* Valor para primitivos */}
                        {!isComplex && (
                            <span className={`${getValueColor(valueType)} break-all`}>
                                {formatValue(value, valueType)}
                            </span>
                        )}

                        {/* Botões de copiar (aparecem apenas quando esta linha específica está com hover) */}
                        {isHovered && (
                            <div className="ml-auto pl-2 flex items-center space-x-1 fade-in" style={{ position: 'relative', zIndex: 10000 }}>
                                <TooltipButton
                                    onClick={() => copyToClipboard(String(itemKey), 'key')}
                                    tooltip="Copy key"
                                >
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                    </svg>
                                </TooltipButton>
                                
                                {!isComplex && (
                                    <TooltipButton
                                        onClick={() => copyToClipboard(getCopyValue(), 'value')}
                                        tooltip="Copy value"
                                    >
                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                        </svg>
                                    </TooltipButton>
                                )}
                                
                                <TooltipButton
                                    onClick={() => copyToClipboard(`${itemKey}: ${getCopyValue()}`, 'both')}
                                    tooltip="Copy key and value"
                                >
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                    </svg>
                                </TooltipButton>
                            </div>
                        )}
                    </div>
                    
                    {/* Renderizar filhos se for objeto/array e estiver expandido */}
                    {isComplex && isExpanded && childEntries.length > 0 && (
                        <div>
                            {childEntries.map(([key, val], index) => (
                                <TreeNodeItem 
                                    key={index}
                                    itemKey={key}
                                    value={val}
                                    isArrayParent={isArrayType}
                                    darkMode={darkMode}
                                    level={level + 1}
                                    expandAll={expandAll}
                                    collapseAll={collapseAll}
                                    showToast={showToast}
                                    onSelectItem={onSelectItem}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Componente HistoryPanel
        function HistoryPanel({ history, onLoad, onClear, darkMode }) {
            if (history.length === 0) {
                return (
                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow">
                        <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                History
                            </h3>
                        </div>
                        <div className="p-4 text-center">
                            <p className="text-gray-500 dark:text-gray-400">
                                No items in history
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-white dark:bg-gray-800 rounded-lg shadow slide-in">
                    <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                        <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                History
                            </h3>
                            <button
                                onClick={onClear}
                                className="text-sm text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300"
                            >
                                Clear
                            </button>
                    </div>
                    <div className="max-h-64 overflow-y-auto">
                        {history.map((item, index) => (
                            <div 
                                key={index}
                                className="p-3 border-b border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer"
                                onClick={() => onLoad(item)}
                            >
                                <div className="flex items-center justify-between">
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm font-medium text-gray-900 dark:text-white truncate">
                                            Item {index + 1}
                                        </p>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 truncate">
                                            {item.substring(0, 50)}...
                                        </p>
                                    </div>
                                    <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                    </svg>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Renderizar a aplicação
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
